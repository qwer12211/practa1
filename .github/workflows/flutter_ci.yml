# Проверка Flutter-проекта при push (аналог пайплайна Django check)
# GitHub → вкладка Actions → workflow «Flutter check»

name: Flutter check

on:
  push:
    branches: [master, main]
  # pull_request:
  #   branches: [master, main]

jobs:
  verify_project_build:
    name: Verify project build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: |
          echo "Установка зависимостей (flutter pub get)"
          flutter pub get
          echo "Зависимости установлены"

      - name: Check Dart analyzer
        run: |
          echo "Проверка кода (flutter analyze)"
          flutter analyze
          echo "Анализ пройден"

      - name: Run tests
        run: |
          echo "Запуск тестов (flutter test)"
          flutter test
          echo "Тесты пройдены"
